<ion-header>

  <ion-toolbar>

    <ion-buttons slot="start">

      <ion-button (click)="close()">

        <ion-icon
          slot="icon-only"
          name="close-outline">
        </ion-icon>

      </ion-button>

    </ion-buttons>

    <ion-title>

      Categorías

    </ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="openForm()">

        <ion-icon
          slot="icon-only"
          name="add-outline">
        </ion-icon>

      </ion-button>

    </ion-buttons>

  </ion-toolbar>

</ion-header>

<ion-content>

  <ion-list>

    @for (category of categoryService.categories(); track category.id) {

      <ion-item>

        <div
          class="category-color"
          [style.background]="category.color">
        </div>

        <ion-label>

          {{ category.name }}

        </ion-label>

        <ion-button
          fill="clear"
          (click)="openForm(category)">

          <ion-icon
            slot="icon-only"
            name="create-outline">
          </ion-icon>

        </ion-button>

        <ion-button
          fill="clear"
          color="danger"
          (click)="delete(category)">

          <ion-icon
            slot="icon-only"
            name="trash-outline">
          </ion-icon>

        </ion-button>

      </ion-item>

    }

  </ion-list>

</ion-content>
