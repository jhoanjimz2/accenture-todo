<ion-header>

  <ion-toolbar>

    <ion-buttons slot="start">

      <ion-button (click)="close()">

        <ion-icon
          slot="icon-only"
          name="chevron-back-outline">
        </ion-icon>

      </ion-button>

    </ion-buttons>

    <ion-title>

      {{ task ? 'Editar tarea' : 'Nueva tarea' }}

    </ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="save()">

        <ion-icon
          slot="icon-only"
          name="checkmark-outline">
        </ion-icon>

      </ion-button>

    </ion-buttons>

  </ion-toolbar>

</ion-header>

<ion-content class="ion-padding">

  <form [formGroup]="form">

    <ion-item>

      <ion-input
        label="Título"
        labelPlacement="stacked"
        formControlName="title">
      </ion-input>

    </ion-item>

    <ion-item>

      <ion-textarea
        label="Descripción"
        labelPlacement="stacked"
        autoGrow="true"
        formControlName="description">
      </ion-textarea>

    </ion-item>

    <ion-item>

      <ion-label>Categoría</ion-label>

      <ion-select
        interface="popover"
        formControlName="categoryId">

        <ion-select-option [value]="null">

          Sin categoría

        </ion-select-option>

        @for(category of categoryService.categories(); track category.id){

          <ion-select-option
            [value]="category.id">

            {{ category.name }}

          </ion-select-option>

        }

      </ion-select>

    </ion-item>

  </form>

</ion-content>
