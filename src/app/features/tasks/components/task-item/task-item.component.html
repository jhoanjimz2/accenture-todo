<ion-item-sliding>
  <ion-item>
    <ion-checkbox
      slot="start"
      [checked]="task.completed"
      (ionChange)="toggleCompleted.emit()">
    </ion-checkbox>
    <ion-label>
      <h2 [class.completed]="task.completed">{{ task.title }}</h2>
      @if(task.description){
        <p>{{ task.description }}</p>
      }
      <ion-chip>{{ categoryName }}</ion-chip>
    </ion-label>
  </ion-item>
  <ion-item-options side="end">
    <ion-item-option color="primary" (click)="edit.emit()">
      Editar
    </ion-item-option>
    <ion-item-option color="danger" (click)="delete.emit()">
      Eliminar
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
